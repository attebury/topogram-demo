name: Imported Proof Freshness

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: "17 14 * * 1-5"

jobs:
  verify-imported-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout topogram-demo
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Verify imported proof targets
        run: node ./ops/verify-imported-targets.mjs

  check-freshness:
    runs-on: ubuntu-latest
    needs: verify-imported-targets
    steps:
      - name: Checkout topogram-demo
        uses: actions/checkout@v4

      - name: Checkout topogram main
        uses: actions/checkout@v4
        with:
          repository: attebury/topogram
          ref: main
          path: topogram

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Check imported claim freshness
        run: node ./ops/claim-freshness.mjs --topogram-repo ./topogram
