name: Imported Proof Freshness

permissions:
  contents: read
  issues: write

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      scope:
        description: Freshness check scope
        required: true
        default: all
        type: choice
        options:
          - all
          - single
      slug:
        description: Active imported target slug to check when scope=single
        required: false
        type: string
  schedule:
    - cron: "17 14 * * 1-5"

jobs:
  verify-imported-targets:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout topogram-demo
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Verify imported proof targets
        run: node ./ops/verify-imported-targets.mjs

  check-freshness:
    runs-on: ubuntu-latest
    needs: verify-imported-targets
    steps:
      - name: Checkout topogram-demo
        uses: actions/checkout@v6

      - name: Checkout topogram main
        uses: actions/checkout@v6
        with:
          repository: attebury/topogram
          ref: main
          path: topogram
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "20"

      - name: Check imported claim freshness
        id: freshness
        run: |
          args=(--topogram-repo ./topogram)
          check_scope="active_inventory"

          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ "${{ inputs.scope }}" = "single" ]; then
            if [ -z "${{ inputs.slug }}" ]; then
              node --input-type=module -e "import fs from 'node:fs'; fs.writeFileSync('freshness-report.json', JSON.stringify({ type: 'claim_freshness_report', checked_at: new Date().toISOString().slice(0, 10), scope: 'selected_targets', selected_slugs: [], stale_target_count: -1, assessed_targets: [], workflow_error: 'workflow_dispatch with scope=single requires a slug input' }, null, 2));"
              cat freshness-report.json
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
              echo "stale_count=-1" >> "$GITHUB_OUTPUT"
              echo "check_scope=selected_targets" >> "$GITHUB_OUTPUT"
              exit 0
            fi

            args+=(--slug "${{ inputs.slug }}")
            check_scope="selected_targets"
          fi

          set +e
          node ./ops/claim-freshness.mjs "${args[@]}" > freshness-report.json
          exit_code=$?
          set -e

          if [ ! -s freshness-report.json ]; then
            node --input-type=module -e "import fs from 'node:fs'; fs.writeFileSync('freshness-report.json', JSON.stringify({ type: 'claim_freshness_report', checked_at: new Date().toISOString().slice(0, 10), stale_target_count: -1, assessed_targets: [], workflow_error: 'claim-freshness.mjs exited before emitting a JSON report' }, null, 2));"
          fi

          cat freshness-report.json

          stale_count=$(node --input-type=module -e "import fs from 'node:fs'; const report = JSON.parse(fs.readFileSync('freshness-report.json', 'utf8')); console.log(report.stale_target_count);")

          echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
          echo "stale_count=$stale_count" >> "$GITHUB_OUTPUT"
          echo "check_scope=$check_scope" >> "$GITHUB_OUTPUT"

      - name: Render freshness summary
        if: always()
        run: |
          node ./ops/render-freshness-markdown.mjs --input freshness-report.json --mode summary > freshness-summary.md
          cat freshness-summary.md >> "$GITHUB_STEP_SUMMARY"

          if [ "${{ steps.freshness.outputs.stale_count }}" != "0" ]; then
            node ./ops/render-freshness-markdown.mjs --input freshness-report.json --mode issue > freshness-issue.md
          fi

      - name: Upload freshness artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: imported-proof-freshness-report
          path: |
            freshness-report.json
            freshness-summary.md
            freshness-issue.md
          if-no-files-found: ignore

      - name: Open or update freshness tracking issue
        if: ${{ always() && github.event_name != 'pull_request' && steps.freshness.outputs.check_scope == 'active_inventory' && steps.freshness.outputs.stale_count != '0' }}
        uses: actions/github-script@v8
        with:
          script: |
            const fs = require("node:fs");
            const title = "Imported proof freshness drift";
            const body = fs.readFileSync("freshness-issue.md", "utf8");
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                body
              });
            } else {
              await github.rest.issues.create({
                owner,
                repo,
                title,
                body
              });
            }

      - name: Close freshness tracking issue when current
        if: ${{ always() && github.event_name != 'pull_request' && steps.freshness.outputs.check_scope == 'active_inventory' && steps.freshness.outputs.stale_count == '0' }}
        uses: actions/github-script@v8
        with:
          script: |
            const title = "Imported proof freshness drift";
            const { owner, repo } = context.repo;
            const { data: issues } = await github.rest.issues.listForRepo({
              owner,
              repo,
              state: "open",
              per_page: 100
            });
            const existing = issues.find((issue) => issue.title === title && !issue.pull_request);

            if (existing) {
              await github.rest.issues.update({
                owner,
                repo,
                issue_number: existing.number,
                state: "closed"
              });
            }

      - name: Fail on freshness drift
        if: ${{ steps.freshness.outputs.exit_code != '0' }}
        run: exit 1
